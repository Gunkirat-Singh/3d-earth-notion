<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background-color: #000000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Creating a Wireframe Sphere (The Earth)
        const geometry = new THREE.SphereGeometry(2, 24, 24);
        const material = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            wireframe: true,
            transparent: true,
            opacity: 0.2 
        });
        const earth = new THREE.Mesh(geometry, material);
        scene.add(earth);

        // Adding "Points" to make it look like data
        const pointsGeometry = new THREE.SphereGeometry(2.02, 32, 32);
        const pointsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02 });
        const earthPoints = new THREE.Points(pointsGeometry, pointsMaterial);
        scene.add(earthPoints);

        camera.position.z = 5;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.002; // Slow "OS" rotation
            earthPoints.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        // Handle Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
