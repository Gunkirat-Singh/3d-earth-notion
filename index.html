<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; }
        canvas { width: 100vw; height: 100vh; display: block; cursor: grab; }
        canvas:active { cursor: grabbing; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // LIGHTING
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.3); 
        scene.add(ambientLight);
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // CONTROLS (Zoom & Manual Rotation)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.dampingFactor = 0.05;
        controls.enableZoom = true;    // Explicitly enabled for scroll/pinch
        controls.enablePan = false;    
        controls.minDistance = 2;      // How close you can zoom
        controls.maxDistance = 20;     // How far you can zoom out

        let earth;
        let isHovered = false;

        const loader = new THREE.GLTFLoader();
        loader.load('earth.glb', function (gltf) {
            earth = gltf.scene;
            earth.scale.set(2.5, 2.5, 2.5);
            
            const box = new THREE.Box3().setFromObject(earth);
            const center = box.getCenter(new THREE.Vector3());
            earth.position.sub(center);
            
            scene.add(earth);
        });

        camera.position.z = 8;

        // Interaction Listeners
        renderer.domElement.addEventListener('mouseenter', () => { isHovered = true; });
        renderer.domElement.addEventListener('mouseleave', () => { isHovered = false; });

        function animate() {
            requestAnimationFrame(animate);
            
            // Auto-spin logic: ONLY when mouse is hovering
            if (earth && isHovered) {
                earth.rotation.y += 0.005;
            }

            controls.update(); // Smooths the manual rotation and zoom
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
