<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        /* This creates the 'Clean Circle' look */
        #container {
            width: 90vmin; 
            height: 90vmin;
            border-radius: 50%; /* Forces the rectangle into a circle */
            overflow: hidden;
            background: radial-gradient(circle, #111 0%, #000 70%); /* Depth effect */
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.1); /* Subtle OS Glow */
            cursor: grab;
            position: relative;
        }

        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/OrbitControls.js"></script>

    <script>
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        
        // Camera with wide clipping planes
        const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // LIGHTING (Boosted for textures)
        scene.add(new THREE.AmbientLight(0xffffff, 1.5)); 
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 3, 5);
        scene.add(light);

        // CONTROLS (Manual + Big Scale Zoom)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enableZoom = true;
        controls.zoomSpeed = 1.5;
        controls.minDistance = 2;   // Zoom in limit
        controls.maxDistance = 15;  // Zoom out limit (keeps it inside the circle)
        controls.enablePan = false;

        let earth;
        let isHovered = false;

        const loader = new THREE.GLTFLoader();
        loader.load('earth.glb', function (gltf) {
            earth = gltf.scene;
            
            // Auto-center and scale
            const box = new THREE.Box3().setFromObject(earth);
            const center = box.getCenter(new THREE.Vector3());
            earth.position.sub(center);
            earth.scale.set(1.5, 1.5, 1.5); 
            
            scene.add(earth);
        });

        camera.position.z = 6;

        container.addEventListener('mouseenter', () => { isHovered = true; });
        container.addEventListener('mouseleave', () => { isHovered = false; });

        function animate() {
            requestAnimationFrame(animate);
            if (earth && isHovered) {
                earth.rotation.y += 0.005;
            }
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        // Responsive Resize
        window.addEventListener('resize', () => {
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.9;
            renderer.setSize(size, size);
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
